# EvoHarness harnessed arm — SESSION SETUP 1.
#   Dev = persistent  (carries memory of the repo across all milestones)
#   Reviewer = milestone (fresh perspective per PR, continuity within a PR's review rounds)
#   QA = persistent   (maintains a coherent growing Test Suite across milestones)
# Full navidrome + ripgrep, Opus-4.7 @ xhigh.
data_root: ${EVOCLAW_DATA_ROOT}
trial_name: harnessed_devqa-persist
agent: harnessed
model: claude-opus-4-7
default_haiku_model: claude-opus-4-7   # pin every Claude Code model slot to opus (no separate billing)
reasoning_effort: xhigh
timeout: 36000
repos:
  - navidrome
  - ripgrep
harnessed_session: "dev:persistent,reviewer:milestone,qa:persistent"
harnessed_max_bounces: 10
