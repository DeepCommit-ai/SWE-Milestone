data_root: /data2/gangda/EvoClaw-data
trial_name: claude-code_deepseek-v4-pro
agent: claude-code

# Fireworks provides an Anthropic-compatible endpoint for this model.
# Before launching, use:
#   export UNIFIED_BASE_URL=https://api.fireworks.ai/inference
model: accounts/fireworks/models/deepseek-v4-pro

# Route all of Claude Code's class-based slots to DeepSeek so background,
# fallback, and subagent calls do not silently hit api.anthropic.com.
default_haiku_model: accounts/fireworks/models/deepseek-v4-pro

# "DeepSeek V4 Pro Max" is DeepSeek V4 Pro with maximum thinking effort.
reasoning_effort: max
timeout: 18000

# Fireworks provides an Anthropic-compatible API, so Claude Code can talk to it
# directly. Leave api_router off to avoid Anthropic <-> OpenAI translation.
