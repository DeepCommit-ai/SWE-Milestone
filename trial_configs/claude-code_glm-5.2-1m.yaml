data_root: ${SWE_MILESTONE_DATA_ROOT}
trial_name: claude-code_glm-5.2-1m
agent: claude-code
# Z.AI bigmodel Anthropic-compatible endpoint (ZAI_BASE_URL / ZAI_API_KEY in .env_private).
base_url: ${ZAI_BASE_URL}
api_key_env: ZAI_API_KEY
model: glm-5.2
default_agent_model: glm-5.2
reasoning_effort: max
timeout: 18000
# 1M-context variant: no auto_compact_window — runs the full model window.

# Uncomment to pin the claude-code CLI version instead of installing latest.
# agent_version: 2.1.210
