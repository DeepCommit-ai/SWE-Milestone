data_root: ${SWE_MILESTONE_DATA_ROOT}
trial_name: claude-code_opus-4.7-1m
agent: claude-code
# Quoted: YAML would parse unquoted [...] as a flow sequence. claude-code
# strips [1m] before the API call and sets the 1M-context beta header.
model: "claude-opus-4-7[1m]"
default_agent_model: "claude-opus-4-7[1m]"
# reasoning_effort unset on purpose: opus-4-7's built-in default is xhigh.
timeout: 18000
# 1M-context variant: no auto_compact_window — runs the full model window.

# Uncomment to pin the claude-code CLI version instead of installing latest.
# agent_version: 2.1.210
