data_root: ${SWE_MILESTONE_DATA_ROOT}
trial_name: gemini-cli_gemini-3.5-flash
agent: gemini-cli
# Vertex mode (Route B): direct ADC auth, no proxy. See docs/vertex-ai.md.
model: gemini-3.5-flash
vertex_ai: true
vertex_location: global
# gemini-cli has no graded levels; "high" is its built-in maximum, set for the record.
reasoning_effort: high
timeout: 18000

# Uncomment to pin the gemini-cli version instead of installing latest.
# agent_version: 0.51.0
