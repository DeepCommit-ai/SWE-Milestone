data_root: /data2/gangda/SWE-Milestone-data
trial_name: gemini-cli_gemini-3.5-flash
agent: gemini-cli

# Vertex AI mode (Route B): gemini-cli talks to Vertex directly using ADC copied
# into the container (no proxy). Auth is ADC — run once on the host:
#   gcloud auth application-default login
# Then:  python scripts/run_all.py --config trial_configs/gemini-cli_gemini-3.5-flash.yaml
# See docs/vertex-ai.md.
model: gemini-3.5-flash
vertex_ai: true
vertex_location: global          # gemini-3.5-flash is served in `global`, not regional

# gemini-cli runs thinkingLevel HIGH (dynamic budget) by default and has no
# graded levels — only thinking on/off — so "high" is its built-in and maximum
# reasoning level. Set explicitly so it's recorded and shown in the monitor.
reasoning_effort: high

timeout: 18000
