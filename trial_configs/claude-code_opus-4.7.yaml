data_root: ${SWE_MILESTONE_DATA_ROOT}
trial_name: claude-code_opus-4.7
agent: claude-code
model: "claude-opus-4-7"
default_agent_model: "claude-opus-4-7"
# reasoning_effort unset on purpose: opus-4-7's built-in default is xhigh.
timeout: 18000
# Default 200K context regime (bare model id; 1M variant is the separate -1m config).
auto_compact_window: 200000

# Uncomment to pin the claude-code CLI version instead of installing latest.
# agent_version: 2.1.210
